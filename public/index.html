<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo · Мессенджер</title>
    <style>
        /* СТИЛИ ОСТАЮТСЯ БЕЗ ИЗМЕНЕНИЙ (сокращено для краткости, используй свои из прошлого ответа) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0b0e11; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        #app { width: 100%; max-width: 480px; height: 780px; background: #1e242b; border-radius: 32px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .panel { display: none; flex-direction: column; height: 100%; padding: 16px; animation: fadeSlide 0.3s ease; overflow-y: auto; }
        .panel.active { display: flex; }
        @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
        .header { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header span.badge { background: #2f8ef5; padding: 2px 12px; border-radius: 40px; font-size: 13px; font-weight: 500; }
        .btn-icon { background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 10px; transition: all 0.2s; }
        .btn-icon:hover { background: #2c313a; color: #fff; transform: scale(1.05); }
        input, textarea, select { width: 100%; padding: 14px 16px; border: none; border-radius: 14px; background: #2c313a; color: #fff; font-size: 15px; margin-bottom: 10px; transition: 0.25s; }
        input::placeholder, textarea::placeholder { color: #888e99; }
        input:focus, textarea:focus { outline: 2px solid #2f8ef5; background: #1e242b; }
        textarea { resize: vertical; min-height: 60px; }
        .btn { padding: 14px; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); background: #2f8ef5; color: #fff; margin-bottom: 8px; user-select: none; }
        .btn:hover { transform: scale(1.02); background: #3b9aff; box-shadow: 0 6px 20px rgba(47, 142, 245, 0.3); }
        .btn-secondary { background: #2c313a; color: #ddd; }
        .btn-secondary:hover { background: #3a404b; }
        .btn-danger { background: #e53e3e; }
        .btn-success { background: #0d9e4a; }
        .btn-sm { padding: 8px 14px; font-size: 13px; margin-bottom: 0; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row .btn { flex: 1; margin-bottom: 0; }
        .flex-center { display: flex; align-items: center; gap: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-muted { color: #888e99; font-size: 13px; }
        .text-center { text-align: center; }
        .mt-8 { margin-top: 8px; }
        .status-message { padding: 10px; border-radius: 10px; margin: 8px 0; text-align: center; font-weight: 500; }
        .status-success { background: #0d6e3a; color: #7dffb3; }
        .status-error { background: #6e1a1a; color: #ff7d7d; }
        .list { flex: 1; overflow-y: auto; margin: 6px 0 10px; display: flex; flex-direction: column; gap: 6px; }
        .item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: #2c313a; border-radius: 16px; cursor: pointer; transition: all 0.2s ease; animation: itemPop 0.25s ease; flex-wrap: wrap; }
        .item:hover { background: #363d48; transform: translateX(4px); }
        .item-group { border-left: 3px solid #2f8ef5; }
        @keyframes itemPop { 0% { opacity: 0; transform: scale(0.96); } 100% { opacity: 1; transform: scale(1); } }
        .avatar-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #2c313a; }
        .avatar-placeholder { width: 44px; height: 44px; border-radius: 50%; background: #2f8ef5; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #fff; flex-shrink: 0; }
        .avatar-sm { width: 32px; height: 32px; font-size: 13px; }
        .avatar-group { background: #8b5cf6; }
        .info { flex: 1; min-width: 0; }
        .info-name { color: #fff; font-weight: 600; font-size: 15px; }
        .info-sub { color: #888e99; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #0d9e4a; display: inline-block; margin-left: 6px; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 4px 0 10px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 82%; animation: msgPop 0.2s ease; }
        .msg-wrapper.self { align-self: flex-end; }
        .msg-wrapper.other { align-self: flex-start; }
        .msg { padding: 10px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .msg.self { background: #2f8ef5; color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { background: #2c313a; color: #ddd; border-bottom-left-radius: 4px; }
        .msg-system { align-self: center; background: #1a1e24; color: #888e99; font-size: 12px; padding: 6px 14px; border-radius: 30px; max-width: 90%; }
        .msg-time { font-size: 10px; color: #888e99; margin-top: 2px; padding: 0 4px; }
        .msg-wrapper.self .msg-time { text-align: right; }
        @keyframes msgPop { 0% { opacity: 0; transform: scale(0.92); } 100% { opacity: 1; transform: scale(1); } }
        .chat-input-row { display: flex; gap: 10px; margin-top: 6px; flex-shrink: 0; }
        .chat-input-row input { flex: 1; margin-bottom: 0; }
        .invite-banner { background: #0d6e3a33; border: 2px solid #0d9e4a; border-radius: 16px; padding: 12px 16px; margin: 8px 0; display: none; align-items: center; justify-content: space-between; gap: 12px; }
        .invite-banner.active { display: flex; }
        .profile-avatar-container { position: relative; width: 100px; height: 100px; margin: 0 auto 10px; }
        .profile-avatar-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #2f8ef5; }
        .profile-avatar-upload { position: absolute; bottom: 0; right: 0; background: #2f8ef5; border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .profile-field { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1a1e24; }
        .call-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.92); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .call-overlay.active { display: flex; }
        .call-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 16px; }
        .call-video-container { position: relative; background: #0b0e11; border-radius: 16px; overflow: hidden; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; border: 2px solid #2c313a; }
        .call-video-container.local { border-color: #2f8ef5; }
        .call-video-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .call-name { color: #fff; font-size: 22px; font-weight: 700; }
        .call-status-text { color: #888e99; font-size: 15px; margin: 4px 0 12px; }
        .call-duration { color: #7dffb3; font-size: 14px; margin-bottom: 12px; }
        .call-controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .call-btn { width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; background: #2c313a; color: #fff; }
        .call-btn:hover { transform: scale(1.08); }
        .call-btn-end { background: #e53e3e; color: #fff; width: 64px; height: 64px; font-size: 28px; }
        .emoji-picker { display: none; position: absolute; bottom: 70px; right: 16px; background: #1e242b; border-radius: 16px; padding: 12px; z-index: 50; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7); max-width: 280px; flex-wrap: wrap; gap: 4px; }
        .emoji-picker.active { display: flex; }
        .emoji-picker span { font-size: 28px; cursor: pointer; padding: 4px; border-radius: 8px; transition: all 0.2s; }
        .emoji-picker span:hover { background: #2c313a; transform: scale(1.2); }
        @media (max-width: 500px) { body { padding: 0; } #app { border-radius: 0; height: 100vh; max-width: 100%; } .call-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="app">
        <!-- ВХОД -->
        <div id="panel-login" class="panel active">
            <div class="header">🔑 Echo <span class="badge">вход</span></div>
            <div id="server-status" class="text-muted text-center" style="padding:4px 0 12px;">🔄 Подключение к серверу...</div>
            <input id="login-email" placeholder="Почта, телефон или имя" />
            <input id="login-pass" type="password" placeholder="Пароль" />
            <button class="btn" id="btn-login">Войти</button>
            <button class="btn btn-secondary" id="btn-to-register">Нет аккаунта? → Регистрация</button>
            <div id="login-status"></div>
        </div>

        <!-- РЕГИСТРАЦИЯ -->
        <div id="panel-register" class="panel">
            <div class="header">📡 Echo <span class="badge">регистр</span></div>
            <input id="reg-name" placeholder="Имя пользователя" />
            <input id="reg-email" placeholder="Эл. почта" />
            <input id="reg-phone" placeholder="Телефон" />
            <input id="reg-pass" type="password" placeholder="Пароль" />
            <button class="btn" id="btn-register">🔐 Зарегистрироваться</button>
            <button class="btn btn-secondary" id="btn-to-login">Уже есть аккаунт → Вход</button>
            <div id="reg-status"></div>
        </div>

        <!-- КОНТАКТЫ -->
        <div id="panel-contacts" class="panel">
            <div class="header">
                <div class="header-left">💬 Echo <span class="badge" id="user-badge">user</span></div>
                <div>
                    <button class="btn-icon" id="btn-profile">👤</button>
                    <button class="btn-icon" id="btn-new-group">➕</button>
                </div>
            </div>
            <div class="flex-center" style="gap:8px; margin-bottom:8px;">
                <span class="text-muted" style="font-size:12px;">🟢 Онлайн: <span id="online-count">0</span></span>
            </div>
            <input id="search-input" placeholder="🔍 Поиск..." />
            <div id="search-results" class="list" style="max-height:150px;"></div>

            <div id="add-to-group-area">
                <div class="flex-center" style="gap:8px;">
                    <span style="color:#aaa; font-size:13px;">➕ В группу:</span>
                    <select id="group-select"></select>
                    <button class="btn btn-success btn-sm" id="btn-add-to-group">Добавить</button>
                </div>
                <div id="add-to-group-status" class="text-muted text-center" style="font-size:12px; margin-top:4px;"></div>
            </div>

            <div class="flex-between" style="margin: 4px 0;">
                <span style="color:#aaa; font-weight:600; font-size:14px;">📋 Чаты</span>
                <button class="btn btn-secondary btn-sm" id="btn-logout">Выйти</button>
            </div>
            <div id="chat-list" class="list"></div>
        </div>

        <!-- ЧАТ -->
        <div id="panel-chat" class="panel">
            <div class="flex-between" style="margin-bottom:10px; flex-shrink:0;">
                <div class="flex-center">
                    <button class="btn-icon" id="btn-back" style="font-size:20px;">←</button>
                    <div id="chat-partner-info" class="flex-center">
                        <div id="chat-avatar-container">
                            <div class="avatar-placeholder avatar-sm" id="chat-avatar">👤</div>
                        </div>
                        <div>
                            <div id="chat-partner-name" style="color:#fff; font-weight:600; font-size:16px;">Чат</div>
                            <div id="chat-partner-sub" class="text-muted" style="font-size:12px;"></div>
                        </div>
                    </div>
                </div>
                <div><button class="btn-icon" id="btn-chat-info">ℹ️</button></div>
            </div>
            <div class="invite-banner" id="call-invite-banner">
                <div>
                    <div class="info-name" id="call-invite-name">📞 Звонок идёт</div>
                    <div class="text-muted" style="font-size:12px;">Нажмите, чтобы присоединиться</div>
                </div>
                <button class="btn btn-success btn-sm" id="btn-join-call">🔊 Присоединиться</button>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input-row">
                <input id="chat-input" placeholder="Сообщение..." />
                <button class="btn" id="btn-send">➤</button>
                <button class="btn btn-secondary" id="btn-emoji" style="padding:14px 12px; font-size:20px;">😊</button>
            </div>
            <div class="emoji-picker" id="emoji-picker">
                <span>😊</span><span>😂</span><span>❤️</span><span>🔥</span><span>👍</span><span>👎</span>
                <span>😍</span><span>🤣</span><span>💀</span><span>✨</span><span>🎉</span><span>💔</span>
            </div>
            <div class="flex-row mt-8" style="flex-shrink:0; flex-wrap:wrap;">
                <button class="btn btn-secondary btn-sm" id="btn-call-start">📞 Аудио</button>
                <button class="btn btn-secondary btn-sm" id="btn-call-video-start">📹 Видео</button>
            </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="panel-profile" class="panel">
            <div class="header">
                <div class="header-left"><button class="btn-icon" id="btn-profile-back" style="font-size:20px;">←</button> 👤 Профиль</div>
                <button class="btn-icon" id="btn-profile-edit">✏️</button>
            </div>
            <div id="profile-view">
                <div class="text-center" style="padding:16px 0;">
                    <div class="profile-avatar-container">
                        <div class="avatar-placeholder" id="profile-avatar-view" style="width:100px;height:100px;font-size:40px;">👤</div>
                        <button class="profile-avatar-upload" id="btn-upload-avatar">📷</button>
                        <input type="file" id="avatar-input" accept="image/*" style="display:none;" />
                    </div>
                    <div style="color:#fff;font-size:20px;font-weight:700;" id="profile-name-view">Имя</div>
                    <div class="text-muted" id="profile-email-view">email@example.com</div>
                </div>
                <div class="profile-field"><span class="text-muted">Телефон</span><span style="color:#fff;" id="profile-phone-view">—</span></div>
                <div class="profile-field"><span class="text-muted">О себе</span><span style="color:#fff;" id="profile-bio-view">—</span></div>
            </div>
            <div id="profile-edit" style="display:none;">
                <input id="edit-name" placeholder="Имя" />
                <input id="edit-phone" placeholder="Телефон" />
                <textarea id="edit-bio" placeholder="О себе" rows="3"></textarea>
                <div class="flex-row"><button class="btn btn-success" id="btn-save-profile">💾 Сохранить</button><button class="btn btn-secondary" id="btn-cancel-edit">Отмена</button></div>
                <div id="profile-status"></div>
            </div>
        </div>

        <!-- НОВАЯ ГРУППА -->
        <div id="panel-new-group" class="panel">
            <div class="header">
                <div class="header-left"><button class="btn-icon" id="btn-new-group-back" style="font-size:20px;">←</button> ➕ Новая группа</div>
            </div>
            <input id="group-name" placeholder="Название группы" />
            <textarea id="group-members" placeholder="Email участников (через запятую)" rows="3"></textarea>
            <button class="btn" id="btn-create-group">🚀 Создать группу</button>
            <div id="group-status"></div>
        </div>

        <!-- ЗВОНОК -->
        <div class="call-overlay" id="call-overlay">
            <div class="call-grid">
                <div class="call-video-container" id="call-remote-container">
                    <div class="avatar-big" id="call-remote-avatar" style="font-size:48px;color:#fff;">👤</div>
                    <video id="call-remote-video" autoplay playsinline style="display:none;"></video>
                    <div class="call-video-label" id="call-remote-label">Собеседник</div>
                </div>
                <div class="call-video-container local" id="call-local-container">
                    <div class="avatar-big" id="call-local-avatar" style="font-size:48px;color:#fff;">📷</div>
                    <video id="call-local-video" autoplay playsinline muted style="display:none;"></video>
                    <div class="call-video-label" id="call-local-label">Вы</div>
                </div>
            </div>
            <div class="call-name" id="call-name">Имя</div>
            <div class="call-status-text" id="call-status-text">Соединение...</div>
            <div class="call-duration" id="call-duration">00:00</div>
            <div class="call-controls">
                <button class="call-btn" id="call-btn-mic">🎤</button>
                <button class="call-btn" id="call-btn-camera">📹</button>
                <button class="call-btn call-btn-end" id="call-btn-end">📞</button>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${window.location.host}`;
        const API_BASE = '';

        let currentUser = null;
        let currentChatId = null;
        let currentChatType = null;
        let ws = null;
        let onlineUsers = [];
        let callState = { active: false, startTime: null, durationInterval: null };

        const $ = id => document.getElementById(id);

        // === ИСПРАВЛЕНО 1: Сохранение сессии ===
        function saveSession(user) {
            if (user) localStorage.setItem('echo_user', JSON.stringify(user));
            else localStorage.removeItem('echo_user');
        }
        function loadSession() {
            try { return JSON.parse(localStorage.getItem('echo_user')); } catch(e) { return null; }
        }

        async function apiRequest(url, method = 'GET', body = null) {
            try {
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (body) options.body = JSON.stringify(body);
                const response = await fetch(API_BASE + url, options);
                return await response.json();
            } catch (e) {
                console.error('API ошибка:', e);
                return { error: 'Ошибка соединения с сервером' };
            }
        }

        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                $('server-status').textContent = '✅ Сервер доступен';
                $('server-status').style.color = '#7dffb3';
                if (currentUser) ws.send(JSON.stringify({ type: 'auth', userId: currentUser.id }));
            };
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (e) { console.error('WS parse error', e); }
            };
            ws.onclose = () => {
                $('server-status').textContent = '❌ Потеря связи...';
                $('server-status').style.color = '#ff7d7d';
                setTimeout(connectWebSocket, 3000);
            };
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'online':
                    onlineUsers = data.onlineUsers || [];
                    updateOnlineStatus();
                    break;
                case 'new_message':
                    // === ИСПРАВЛЕНО 4: Мгновенное обновление сообщений ===
                    if (data.chatId === currentChatId) renderMessages();
                    renderChatList(); 
                    break;
                case 'call_started':
                    // === ИСПРАВЛЕНО 3: Баннер видят только ДРУГИЕ участники, а не звонящий ===
                    if (data.chatId === currentChatId && data.callerId !== currentUser.id) {
                        $('call-invite-banner').classList.add('active');
                        $('call-invite-name').textContent = `📞 ${data.callerName} начал звонок`;
                        $('btn-join-call').dataset.callId = data.chatId;
                    }
                    break;
                case 'call_ended':
                    if (data.chatId === currentChatId) {
                        $('call-invite-banner').classList.remove('active');
                        if ($('call-overlay').classList.contains('active')) endCall();
                    }
                    break;
            }
        }

        function showPanel(name) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const panel = $(`panel-${name}`);
            if (panel) panel.classList.add('active');
        }

        function setStatus(el, message, type) {
            if (!el) return;
            if (!message) { el.innerHTML = ''; el.className = ''; return; }
            const types = { success: 'status-message status-success', error: 'status-message status-error' };
            el.className = types[type] || '';
            el.textContent = message;
        }

        function getInitials(name) { return name ? name.charAt(0).toUpperCase() : '?'; }

        function updateOnlineStatus() {
            const count = $('online-count');
            if (count) count.textContent = onlineUsers.length;
        }

        async function renderChatList() {
            if (!currentUser) return;
            const data = await apiRequest(`/api/chats/${currentUser.id}`);
            if (data.error) return;
            
            const chatList = $('chat-list');
            chatList.innerHTML = '';
            if (data.length === 0) {
                chatList.innerHTML = '<div class="text-muted text-center" style="padding:20px;">Нет чатов</div>';
                return;
            }

            data.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'item' + (chat.type === 'group' ? ' item-group' : '');
                
                const avatarDiv = document.createElement('div');
                if (chat.type === 'group') {
                    avatarDiv.className = 'avatar-placeholder avatar-group';
                    avatarDiv.textContent = '👥';
                } else {
                    if (chat.avatar && chat.avatar.startsWith('data:')) {
                        const img = document.createElement('img');
                        img.src = chat.avatar; img.className = 'avatar-img';
                        avatarDiv.appendChild(img);
                    } else {
                        avatarDiv.className = 'avatar-placeholder';
                        avatarDiv.textContent = getInitials(chat.name);
                    }
                    if (onlineUsers.includes(chat.userId)) {
                        const dot = document.createElement('span');
                        dot.className = 'online-dot';
                        avatarDiv.appendChild(dot);
                    }
                }
                div.appendChild(avatarDiv);

                const info = document.createElement('div');
                info.className = 'info';
                const nameDiv = document.createElement('div');
                nameDiv.className = 'info-name';
                nameDiv.textContent = chat.name + (chat.type === 'group' ? ' 👥' : '');
                
                const subDiv = document.createElement('div');
                subDiv.className = 'info-sub';
                if (chat.lastMessage) {
                    const prefix = chat.lastMessage.from === currentUser.id ? 'Я: ' : '';
                    subDiv.textContent = prefix + chat.lastMessage.text;
                } else {
                    subDiv.textContent = 'Нет сообщений';
                }
                
                info.appendChild(nameDiv);
                info.appendChild(subDiv);
                div.appendChild(info);
                div.addEventListener('click', () => openChat(chat.id, chat.type));
                chatList.appendChild(div);
            });
        }

        async function openChat(chatId, type) {
            currentChatId = chatId;
            currentChatType = type;
            $('call-invite-banner').classList.remove('active');
            $('emoji-picker').classList.remove('active');

            const chats = await apiRequest(`/api/chats/${currentUser.id}`);
            const chat = chats.find(c => c.id === chatId);

            if (chat) {
                if (chat.type === 'group') {
                    $('chat-partner-name').textContent = chat.name;
                    $('chat-partner-sub').textContent = chat.members ? chat.members.length + ' участников' : '';
                    $('chat-avatar').textContent = '👥';
                    $('chat-avatar').className = 'avatar-placeholder avatar-sm avatar-group';
                } else {
                    $('chat-partner-name').textContent = chat.name;
                    $('chat-partner-sub').textContent = onlineUsers.includes(chat.userId) ? 'В сети' : 'Не в сети';
                    const container = $('chat-avatar-container');
                    if (chat.avatar && chat.avatar.startsWith('data:')) {
                        container.innerHTML = `<img src="${chat.avatar}" class="avatar-img" style="width:32px;height:32px;" />`;
                    } else {
                        container.innerHTML = `<div class="avatar-placeholder avatar-sm">${getInitials(chat.name)}</div>`;
                    }
                }
            }
            renderMessages();
            showPanel('chat');
        }

        async function renderMessages() {
            if (!currentUser || !currentChatId) return;
            const msgs = await apiRequest(`/api/messages/${currentChatId}`);
            if (msgs.error) return;
            
            const chatMessages = $('chat-messages');
            chatMessages.innerHTML = '';
            
            if (msgs.length === 0) {
                chatMessages.innerHTML = '<div class="text-muted text-center" style="padding:20px;">Начните общение</div>';
                return;
            }

            for (const msg of msgs) {
                if (msg.from === 'system') {
                    const div = document.createElement('div');
                    div.className = 'msg-system';
                    div.textContent = msg.text;
                    chatMessages.appendChild(div);
                    continue;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'msg-wrapper';
                const isSelf = msg.from === currentUser.id;
                wrapper.classList.add(isSelf ? 'self' : 'other');

                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg ' + (isSelf ? 'self' : 'other');
                
                if (currentChatType === 'group' && !isSelf) {
                    const users = await apiRequest('/api/users'); 
                    const sender = users.find(u => u.id === msg.from);
                    msgDiv.innerHTML = `<b>${sender ? sender.name : 'Unknown'}:</b> ${msg.text}`;
                } else {
                    msgDiv.textContent = msg.text;
                }
                
                wrapper.appendChild(msgDiv);
                const timeDiv = document.createElement('div');
                timeDiv.className = 'msg-time';
                timeDiv.textContent = new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                wrapper.appendChild(timeDiv);
                chatMessages.appendChild(wrapper);
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage(text) {
            if (!currentUser || !currentChatId || !text.trim()) return;
            const data = { chatId: currentChatId, from: currentUser.id, text: text.trim() };
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ ...data, type: 'message' }));
            } else {
                await apiRequest('/api/messages', 'POST', data);
            }
            $('chat-input').value = '';
            renderMessages();
            renderChatList();
            $('emoji-picker').classList.remove('active');
        }

        async function createGroup() {
            const name = $('group-name').value.trim();
            const emails = $('group-members').value.split(',').map(e => e.trim()).filter(e => e);
            if (!name) { setStatus($('group-status'), '⚠️ Введите название', 'error'); return; }
            
            const users = await apiRequest('/api/users');
            if (users.error) return;

            const members = [currentUser.id];
            const notFound = [];
            emails.forEach(email => {
                const user = users.find(u => u.email === email);
                if (user && !members.includes(user.id)) members.push(user.id);
                else if (!user) notFound.push(email);
            });

            if (notFound.length > 0) {
                setStatus($('group-status'), '⚠️ Не найдены: ' + notFound.join(', '), 'error');
                return;
            }

            const result = await apiRequest('/api/groups', 'POST', { name, members, creatorId: currentUser.id });
            if (result.success) {
                setStatus($('group-status'), '✅ Группа создана!', 'success');
                $('group-name').value = '';
                $('group-members').value = '';
                setTimeout(() => {
                    showPanel('contacts');
                    renderChatList();
                    setStatus($('group-status'), '', '');
                }, 1000);
            } else {
                setStatus($('group-status'), '❌ ' + (result.error || 'Ошибка'), 'error');
            }
        }

        function startCall(type) {
            if (!currentChatId) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'call_start', chatId: currentChatId, callerId: currentUser.id,
                    callType: type, callerName: currentUser.name
                }));
            }
            $('call-overlay').classList.add('active');
            $('call-name').textContent = $('chat-partner-name').textContent;
            $('call-status-text').textContent = '📞 Соединение...';
            $('call-invite-banner').classList.remove('active');
            setTimeout(() => {
                $('call-status-text').textContent = '🔊 Идёт звонок';
                startDurationTimer();
            }, 1000);
        }

        function joinCall() {
            if (!currentChatId) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'call_join', chatId: currentChatId, userId: currentUser.id, userName: currentUser.name
                }));
            }
            $('call-overlay').classList.add('active');
            $('call-name').textContent = $('chat-partner-name').textContent;
            $('call-status-text').textContent = '🔊 Вы присоединились';
            $('call-invite-banner').classList.remove('active');
            startDurationTimer();
        }

        function endCall() {
            callState.active = false;
            if (callState.durationInterval) clearInterval(callState.durationInterval);
            $('call-overlay').classList.remove('active');
            $('call-duration').textContent = '00:00';
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'call_end', chatId: currentChatId }));
            }
        }

        function startDurationTimer() {
            callState.active = true;
            callState.startTime = Date.now();
            if (callState.durationInterval) clearInterval(callState.durationInterval);
            callState.durationInterval = setInterval(() => {
                if (!callState.active) return;
                const elapsed = Date.now() - callState.startTime;
                const mins = Math.floor(elapsed / 60000).toString().padStart(2, '0');
                const secs = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                $('call-duration').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        async function loginUser(user) {
            currentUser = user;
            saveSession(user); // Сохраняем сессию!
            $('user-badge').textContent = user.name;
            renderChatList();
            showPanel('contacts');
            $('login-email').value = '';
            $('login-pass').value = '';
            setStatus($('login-status'), '', '');
            if (!ws || ws.readyState !== WebSocket.OPEN) connectWebSocket();
            else ws.send(JSON.stringify({ type: 'auth', userId: user.id }));
        }

        function logout() {
            currentUser = null;
            currentChatId = null;
            saveSession(null); // Очищаем сессию!
            if (ws) ws.close();
            showPanel('login');
        }

        // Обработчики
        $('btn-login').addEventListener('click', async () => {
            const login = $('login-email').value.trim();
            const pass = $('login-pass').value.trim();
            if (!login || !pass) { setStatus($('login-status'), '⚠️ Заполните поля', 'error'); return; }
            const result = await apiRequest('/api/login', 'POST', { login, password: pass });
            if (result.error) setStatus($('login-status'), '❌ ' + result.error, 'error');
            else loginUser(result.user);
        });

        $('btn-register').addEventListener('click', async () => {
            const name = $('reg-name').value.trim();
            const email = $('reg-email').value.trim();
            const phone = $('reg-phone').value.trim();
            const password = $('reg-pass').value.trim();
            if (!name || !email || !phone || !password) { setStatus($('reg-status'), '⚠️ Заполните все поля', 'error'); return; }

            const result = await apiRequest('/api/register', 'POST', { name, email, phone, password });
            if (result.error) setStatus($('reg-status'), '❌ ' + result.error, 'error');
            else {
                setStatus($('reg-status'), '✅ Успешно! Теперь войдите.', 'success');
                setTimeout(() => showPanel('login'), 1500);
            }
        });

        $('btn-to-register').addEventListener('click', () => showPanel('register'));
        $('btn-to-login').addEventListener('click', () => showPanel('login'));
        $('btn-logout').addEventListener('click', logout);
        $('btn-back').addEventListener('click', () => { currentChatId = null; showPanel('contacts'); renderChatList(); });
        $('btn-profile').addEventListener('click', () => showPanel('profile'));
        $('btn-profile-back').addEventListener('click', () => showPanel('contacts'));
        $('btn-new-group').addEventListener('click', () => showPanel('newGroup'));
        $('btn-new-group-back').addEventListener('click', () => showPanel('contacts'));
        $('btn-create-group').addEventListener('click', createGroup);
        $('btn-send').addEventListener('click', () => sendMessage($('chat-input').value));
        $('chat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage($('chat-input').value); });
        
        $('btn-emoji').addEventListener('click', (e) => { e.stopPropagation(); $('emoji-picker').classList.toggle('active'); });
        $('emoji-picker').addEventListener('click', (e) => {
            if (e.target.tagName === 'SPAN') {
                $('chat-input').value += e.target.textContent;
                $('chat-input').focus();
            }
        });
        document.addEventListener('click', (e) => {
            if (!$('emoji-picker').contains(e.target) && e.target !== $('btn-emoji')) {
                $('emoji-picker').classList.remove('active');
            }
        });

        $('btn-call-start').addEventListener('click', () => startCall('audio'));
        $('btn-call-video-start').addEventListener('click', () => startCall('video'));
        $('btn-join-call').addEventListener('click', joinCall);
        $('call-btn-end').addEventListener('click', endCall);

        $('btn-profile-edit').addEventListener('click', () => {
            $('profile-view').style.display = 'none';
            $('profile-edit').style.display = 'block';
            $('edit-name').value = currentUser.name;
            $('edit-phone').value = currentUser.phone;
            $('edit-bio').value = currentUser.bio || '';
        });
        $('btn-cancel-edit').addEventListener('click', () => {
            $('profile-view').style.display = 'block';
            $('profile-edit').style.display = 'none';
        });
        $('btn-save-profile').addEventListener('click', async () => {
            const result = await apiRequest(`/api/users/${currentUser.id}`, 'PUT', {
                name: $('edit-name').value, phone: $('edit-phone').value, bio: $('edit-bio').value
            });
            if (result.success) {
                currentUser = result.user;
                saveSession(currentUser);
                $('user-badge').textContent = currentUser.name;
                $('profile-name-view').textContent = currentUser.name;
                $('profile-view').style.display = 'block';
                $('profile-edit').style.display = 'none';
            }
        });

        // === ИСПРАВЛЕНО 1 (продолжение): Проверка сессии при загрузке ===
        const savedUser = loadSession();
        if (savedUser) {
            loginUser(savedUser);
        } else {
            showPanel('login');
        }
        connectWebSocket();

        function checkServer() {
             fetch(API_BASE + '/api/users').then(r => {
                 if(r.ok) {
                     $('server-status').textContent = '✅ Сервер готов';
                     $('server-status').style.color = '#7dffb3';
                 }
             }).catch(() => {
                 $('server-status').textContent = '❌ Сервер недоступен';
                 $('server-status').style.color = '#ff7d7d';
             });
        }
        checkServer();
    </script>
</body>
</html>
